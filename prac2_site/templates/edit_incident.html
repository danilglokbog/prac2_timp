<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать инцидент</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container form-page">
        <div class="card interactive-card">
            <h2>Редактировать инцидент</h2>
            <form method="POST">
                <div class="form-group">
                    <label>Дата</label>
                    <input type="date" name="date" value="{{ inc.date }}" required>
                </div>
                <div class="form-group">
                    <label>Место</label>
                    <input type="text" name="location" value="{{ inc.location }}" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description" rows="3" required>{{ inc.description }}</textarea>
                </div>
                <div class="form-group">
                    <label>Серьёзность</label>
                    <select name="severity" required>
                        <option value="Низкая" {% if inc.severity == 'Низкая' %}selected{% endif %}>Низкая</option>
                        <option value="Средняя" {% if inc.severity == 'Средняя' %}selected{% endif %}>Средняя</option>
                        <option value="Высокая" {% if inc.severity == 'Высокая' %}selected{% endif %}>Высокая</option>
                    </select>
                </div>
                <button type="submit" class="admin-btn">Сохранить</button>
                <a href="{{ url_for('admin') }}" class="admin-btn" style="background: #555;">Отмена</a>
            </form>
        </div>
    </div>
</body>
</html>
