<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удалить инцидент</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container form-page">
        <div class="card interactive-card delete-card">
            <h2><i class="fas fa-trash-alt"></i> Подтверждение удаления</h2>
            <p>Вы уверены, что хотите удалить инцидент в месте "<strong>{{ inc.location }}</strong>" от {{ inc.date }}?</p>
            <form method="POST" style="margin-top: 20px;">
                <button type="submit" class="admin-btn" style="background: #e74c3c; color: white;">Удалить</button>
                <a href="{{ url_for('admin') }}" class="admin-btn" style="background: #555;">Отмена</a>
            </form>
        </div>
    </div>
</body>
</html>
