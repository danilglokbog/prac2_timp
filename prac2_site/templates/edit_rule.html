<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать правило</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container form-page">
        <div class="card interactive-card">
            <h2>Редактировать правило</h2>
            <form method="POST">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" name="title" value="{{ rule.title }}" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description" rows="3" required>{{ rule.description }}</textarea>
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <input type="text" name="category" value="{{ rule.category }}" required>
                </div>
                <button type="submit" class="admin-btn">Сохранить</button>
                <a href="{{ url_for('admin') }}" class="admin-btn" style="background: #555;">Отмена</a>
            </form>
        </div>
    </div>
</body>
</html>
